  <style>
    :root {
      --bg: #fff;
      --fg: #000;
      --fg-alt: #888;
      --accent: #000;
    }
    [data-theme="dark"] {
      --bg: #111;
      --fg: #fff;
      --fg-alt: #aaa;
    }

    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: Inter, sans-serif;
      background: var(--bg);
      color: var(--fg);
      transition: background .3s, color .3s;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 0 0 2.2rem;
      gap: 1.2rem;
      max-width: none;
      margin: 0;
      height: 100px;
    }
    .logo {
      height: 100px;
      margin-right: 2.2rem;
      flex-shrink: 0;
    }
    nav {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0.7rem;
      height: 100px;
    }
    nav a {
      text-decoration: none;
      color: var(--fg);
      font-family: 'Inter', Arial, sans-serif;
      font-weight: 600;
      font-size: 0.92rem;
      letter-spacing: 0.03em;
      position: relative;
      padding: 0 0.18em 0 0.18em;
      border-radius: 0;
      background: none;
      box-shadow: none;
      transition: color .18s, border .18s;
      line-height: 100px;
    }
    nav a.active {
      color: var(--fg);
    }
    nav a.active::after {
      content: '';
      display: block;
      width: 100%;
      height: 2px;
      background: var(--fg);
      margin-top: 2px;
      border-radius: 1px;
      position: absolute;
      left: 0;
      bottom: 4px;
    }
    nav a:hover {
      color: var(--fg-alt);
    }
    nav a:not(.active):hover::after {
      display: none;
    }
    #theme-toggle {
      background: none;
      border: none;
      font-size: 1.05rem;
      cursor: pointer;
      color: var(--fg);
      margin-left: 1.1rem;
      padding: 0 0.2em;
      line-height: 100px;
      vertical-align: middle;
      filter: grayscale(100%);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
      gap: 10px;
      padding: 1rem;
    }
    .gallery a {
      display: block;
      overflow: hidden;
      position: relative;
    }
    .gallery img {
      width: 100%;
      aspect-ratio: 5/8;
      max-height: 400px;
      object-fit: cover;
      display: block;
      filter: grayscale(0%);
      border-radius: 0;
      transition: transform .3s, filter .3s, box-shadow .3s;
      box-shadow: 0 2px 12px 0 rgba(0,0,0,0.07);
    }
    .gallery img:hover {
      transform: scale(1.05);
      filter: grayscale(80%);
      box-shadow: 0 6px 24px 0 rgba(0,0,0,0.13);
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: .9rem;
      color: var(--fg-alt);
    }
    footer a { color: var(--fg-alt); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    #to-top {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      background: var(--accent);
      color: var(--bg);
      padding: .5rem 1rem;
      border-radius: 5px;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity .3s;
    }
    #to-top:hover { opacity: 1; }

    @media (max-width: 768px) {
      header { padding: 1rem; }
      .logo { height: 80px; }
      nav { flex-direction: row; gap: 0.5rem; }
      #theme-toggle { margin-top: 0; margin-left: 1rem; }
      .gallery { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .gallery { grid-template-columns: 1fr 1fr; }
      header { padding: 0.5rem; }
    }
  </style>
</head>

  <script defer src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
  <script defer>
    window.addEventListener('load',()=> {
      GLightbox({ selector: '.glightbox' });
    });
    const btn = document.getElementById('theme-toggle');
    function setThemeIcon(theme) {
      btn.innerHTML = theme === 'dark'
        ? `<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="2" fill="none"/><path d="M14 10a4 4 0 0 1-4 4A4 4 0 0 1 10 6a4 4 0 0 1 4 4z" fill="currentColor"/></svg>`
        : `<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="5" stroke="currentColor" stroke-width="2" fill="none"/><g stroke="currentColor" stroke-width="2"><line x1="10" y1="1" x2="10" y2="4"/><line x1="10" y1="16" x2="10" y2="19"/><line x1="1" y1="10" x2="4" y2="10"/><line x1="16" y1="10" x2="19" y2="10"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="13.66" y1="13.66" x2="15.78" y2="15.78"/><line x1="4.22" y1="15.78" x2="6.34" y2="13.66"/><line x1="13.66" y1="6.34" x2="15.78" y2="4.22"/></g></svg>`;
    }
    setThemeIcon(document.body.getAttribute('data-theme'));
    btn.addEventListener('click',()=>{
      const current = document.body.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.body.setAttribute('data-theme', next);
      setThemeIcon(next);
    });
    document.getElementById('to-top').addEventListener('click',e=>{
      e.preventDefault();
      window.scroll({ top:0, behavior:'smooth' });
    });
  </script>
