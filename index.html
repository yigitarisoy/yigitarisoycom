<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Yigit Arisoy — Melbourne Photographer</title>

  <!-- SEO -->
  <meta name="description" content="Melbourne photographer specialising in real estate, property, and commercial photography. Based in Footscray, servicing the inner west and beyond.">
  <meta name="keywords" content="Melbourne photographer, real estate photography Melbourne, property photography, Footscray photographer, inner west Melbourne photography">
  <meta name="author" content="Yigit Arisoy">

  <!-- Open Graph (looks good when shared on social / messages) -->
  <meta property="og:title" content="Yigit Arisoy — Melbourne Photographer">
  <meta property="og:description" content="Real estate, property and commercial photography. Based in Footscray, Melbourne.">
  <meta property="og:url" content="https://yigitarisoy.com">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
  <link rel="icon" href="images/logo.png" type="image/png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f9f8f6;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    header {
      display: flex;
      align-items: center;
      padding: 0 2.5rem;
      height: 88px;
      gap: 2rem;
      position: sticky;
      top: 0;
      background: #f9f8f6;
      z-index: 100;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .logo { height: 64px; flex-shrink: 0; }
    nav { display: flex; align-items: center; gap: 2rem; }
    nav a {
      text-decoration: none;
      color: #1a1a1a;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    nav a:hover, nav a.active { opacity: 1; }

    .gallery {
      padding: 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .photo-row {
      display: grid;
      gap: 1rem;
      height: 580px;
      /* Fade in on scroll */
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .photo-row.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .photo-row.big-left  { grid-template-columns: 2fr 1fr; }
    .photo-row.big-right { grid-template-columns: 1fr 2fr; }
    .photo-row.full      { grid-template-columns: 1fr; height: 520px; }

    .photo-item {
      overflow: hidden;
      cursor: pointer;
      background: #e8e6e1;
    }
    .photo-item a { display: block; width: 100%; height: 100%; }
    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.4s;
      opacity: 0;
    }
    .photo-item img.loaded { opacity: 1; }
    .photo-item:hover img { transform: scale(1.03); }

    footer {
      text-align: center;
      padding: 3rem 1rem;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #999;
    }
    footer a { color: #999; text-decoration: none; }
    footer a:hover { color: #1a1a1a; }

    @media (max-width: 768px) {
      header { padding: 0 1.2rem; height: 70px; }
      .logo { height: 50px; }
      nav { gap: 1.2rem; }
      .gallery { padding: 1rem; gap: 0.6rem; }
      .photo-row { grid-template-columns: 1fr !important; height: auto !important; }
      .photo-item { height: 260px; }
      .photo-row.full { height: auto !important; }
      .photo-row.full .photo-item { height: 320px; }
    }

    body {
  animation: pagefade 1.0s ease;
}
@keyframes pagefade {
  from { opacity: 0; }
  to   { opacity: 1; }
}

    @media (pointer: fine) {
      *, *::before, *::after { cursor: none !important; }
      #cursor-dot {
        position: fixed;
        top: 0; left: 0;
        width: 8px; height: 8px;
        background: #1a1a1a;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: opacity 0.3s;
      }
    }
  </style>
</head>
<body>
  <div id="cursor-dot"></div>

  <header>
    <img src="images/logo.png" alt="Yigit Arisoy" class="logo">
    <nav>
      <a href="index.html" class="active">Home</a>
      <a href="property.html">Property</a>
      <a href="https://www.instagram.com/yigitarsy" target="_blank" rel="noopener noreferrer">Instagram</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <div class="gallery" id="gallery"></div>

  <footer>
    &copy; 2025 Yigit Arisoy &nbsp;&middot;&nbsp;
    <a href="https://www.instagram.com/yigitarsy" target="_blank">Instagram</a>
  </footer>

  <script src="photos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
  <script>
    const gallery = document.getElementById('gallery');
    let i = 0;
    let rowIndex = 0;

    while (i < photos.length) {
      const remaining = photos.length - i;

      if (remaining === 1) {
        const row = document.createElement('div');
        row.className = 'photo-row full';
        row.appendChild(makeItem(photos[i]));
        gallery.appendChild(row);
        i++;
        break;
      }

      const row = document.createElement('div');
      row.className = 'photo-row ' + (rowIndex % 2 === 0 ? 'big-left' : 'big-right');
      row.appendChild(makeItem(photos[i])); i++;
      if (i < photos.length) { row.appendChild(makeItem(photos[i])); i++; }
      gallery.appendChild(row);
      rowIndex++;
    }

    function makeItem(photo) {
      const div = document.createElement('div');
      div.className = 'photo-item';
      const a = document.createElement('a');
      a.href = 'gallery/' + photo.file;
      a.className = 'glightbox';
      a.setAttribute('data-gallery', 'portfolio');
      const img = document.createElement('img');
      img.src = 'gallery/' + photo.file;
      img.alt = '';
      img.loading = 'lazy';
      img.addEventListener('load', () => img.classList.add('loaded'));
      if (img.complete) img.classList.add('loaded');
      a.appendChild(img);
      div.appendChild(a);
      return div;
    }

    GLightbox({ selector: '.glightbox' });

    // Scroll fade-in observer
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, idx) => {
        if (entry.isIntersecting) {
          // Slight stagger for rows visible at same time
          setTimeout(() => {
            entry.target.classList.add('visible');
          }, idx * 80);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.08 });

    document.querySelectorAll('.photo-row').forEach(row => observer.observe(row));

    const dot = document.getElementById('cursor-dot');
    if (dot) {
      document.addEventListener('mousemove', e => {
        dot.style.left = e.clientX + 'px';
        dot.style.top  = e.clientY + 'px';
      });
    }
  </script>
</body>
</html>
