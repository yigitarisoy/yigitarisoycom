<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Property — Yigit Arisoy</title>
  <meta name="description" content="Real estate and property photography by Yigit Arisoy. Based in Footscray, Melbourne. Servicing the inner west and surrounds.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="images/logo.png" type="image/png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f9f8f6;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      letter-spacing: 0.02em;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      padding: 0 2.5rem;
      height: 88px;
      gap: 2rem;
      position: sticky;
      top: 0;
      background: #f9f8f6;
      z-index: 100;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .logo { height: 64px; flex-shrink: 0; }
    nav { display: flex; align-items: center; gap: 2rem; }
    nav a {
      text-decoration: none;
      color: #1a1a1a;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    nav a:hover, nav a.active { opacity: 1; }

    .coming-soon {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
      gap: 1.5rem;
    }

    .coming-soon .label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
    }

    .coming-soon h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: #1a1a1a;
      line-height: 1.2;
    }

    .coming-soon p {
      font-size: 12px;
      color: #999;
      letter-spacing: 0.05em;
      max-width: 320px;
      line-height: 1.8;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: #1a1a1a;
      opacity: 0.12;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-top: 0.5rem;
    }
    .contact-links a {
      font-size: 12px;
      color: #1a1a1a;
      text-decoration: none;
      letter-spacing: 0.05em;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .contact-links a:hover { opacity: 1; }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #999;
    }
    footer a { color: #999; text-decoration: none; }
    footer a:hover { color: #1a1a1a; }

    @media (max-width: 768px) {
      header { padding: 0 1.2rem; height: 70px; }
      .logo { height: 50px; }
      nav { gap: 1.2rem; }
    }

    body {
  animation: pagefade 0.4s ease;
}
@keyframes pagefade {
  from { opacity: 0; }
  to   { opacity: 1; }
}

  </style>
</head>
<body>

  <header>
    <img src="images/logo.png" alt="Yigit Arisoy" class="logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="property.html" class="active">Property</a>
      <a href="https://www.instagram.com/yigitarsy" target="_blank" rel="noopener noreferrer">Instagram</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <div class="coming-soon">
    <span class="label">Property Photography</span>
    <h1>Portfolio coming soon</h1>
    <div class="divider"></div>
    <p>Currently accepting new clients across Melbourne's inner west. Get in touch to discuss your listing.</p>
    <div class="contact-links">
      <a href="mailto:info@yigitarisoy.com">info@yigitarisoy.com</a>
      <a href="tel:+61401780333">+61 401 780 333</a>
    </div>
  </div>

  <footer>
    &copy; 2025 Yigit Arisoy &nbsp;&middot;&nbsp;
    <a href="https://www.instagram.com/yigitarsy" target="_blank">Instagram</a>
  </footer>

</body>
</html>
